<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Professional Services</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --whatsapp-green: #25D366;
            --text-gray: #666;
            --bg-light: #f4f7f6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-light);
            color: var(--primary-color);
            line-height: 1.6;
        }

        .container {
            max-width: 1100px;
            margin: 50px auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: var(--primary-color);
        }

        .header p {
            color: var(--text-gray);
        }

        .contact-wrapper {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 40px;
            background: #fff;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        /* Left Side: Contact Info */
        .contact-info {
            background: var(--primary-color);
            padding: 40px;
            color: #fff;
        }

        .contact-info h3 {
            margin-bottom: 25px;
            font-size: 1.5rem;
        }

        .info-item {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
        }

        .info-item i {
            font-size: 1.2rem;
            margin-right: 15px;
            color: var(--accent-color);
        }

        /* WhatsApp Specific Styling */
        .whatsapp-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            margin-top: 30px;
            border-left: 4px solid var(--whatsapp-green);
        }

        .whatsapp-btn {
            display: inline-flex;
            align-items: center;
            background: var(--whatsapp-green);
            color: white;
            padding: 12px 20px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 15px;
            transition: transform 0.3s ease;
        }

        .whatsapp-btn:hover {
            transform: translateY(-3px);
            background: #20ba5a;
        }

        .whatsapp-btn i {
            margin-right: 10px;
            font-size: 1.4rem;
        }

        /* Right Side: Contact Form */
        .contact-form {
            padding: 40px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .form-group input, 
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-group input:focus, 
        .form-group textarea:focus {
            border-color: var(--accent-color);
        }

        .submit-btn {
            background: var(--accent-color);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }

        .submit-btn:hover {
            background: #2980b9;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .contact-wrapper {
                grid-template-columns: 1fr;
            }
            
            .container {
                margin: 20px auto;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Get In Touch</h1>
            <p>Have a question or want to work together? Drop us a message.</p>
        </div>

        <div class="contact-wrapper">
            <!-- Contact Details -->
            <div class="contact-info">
                <h3>Contact Information</h3>
                
                <div class="info-item">
                    <i class="fas fa-envelope"></i>
                    <span>contact@yourdomain.com</span>
                </div>

                <div class="info-item">
                    <i class="fas fa-map-marker-alt"></i>
                    <span>123 Business Avenue, City Center</span>
                </div>

                <!-- WhatsApp Highlight -->
                <div class="whatsapp-card">
                    <p>For instant support, chat with us on WhatsApp:</p>
                    <a href="https://wa.me/923068243870" class="whatsapp-btn" target="_blank">
                        <i class="fab fa-whatsapp"></i> 0306 8243870
                    </a>
                </div>
            </div>

            <!-- Contact Form -->
            <div class="contact-form">
                <form action="#">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" placeholder="John Doe" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="john@example.com" required>
                    </div>

                    <div class="form-group">
                        <label for="subject">Subject</label>
                        <input type="text" id="subject" placeholder="Project Inquiry" required>
                    </div>

                    <div class="form-group">
                        <label for="message">Your Message</label>
                        <textarea id="message" rows="5" placeholder="How can we help you?" required></textarea>
                    </div>

                    <button type="submit" class="submit-btn">Send Message</button>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
