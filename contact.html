<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>

<style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
}

.container{
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    padding:40px;
    border-radius:12px;
    text-align:center;
    width:90%;
    max-width:500px;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
}

h1{
    margin-bottom:15px;
}

p{
    font-size:18px;
    line-height:1.6;
}

.whatsapp-btn{
    display:inline-block;
    margin-top:25px;
    padding:14px 25px;
    background:#25D366;
    color:white;
    font-size:18px;
    text-decoration:none;
    border-radius:8px;
    transition:0.3s;
}

.whatsapp-btn:hover{
    background:#1ebe5d;
    transform:scale(1.05);
}

.number{
    margin-top:15px;
    font-size:20px;
    font-weight:bold;
}
</style>

</head>

<body>

<div class="container">
    <h1>Contact Us</h1>

    <p>
        To buy a license for Autofill Vault Please contact on this number.
    </p>

    <div class="number">
        WhatsApp: 03068243870
    </div>

    <a class="whatsapp-btn" 
       href="https://wa.me/923068243870" 
       target="_blank">
       Chat on WhatsApp
    </a>

</div>

</body>
</html>
